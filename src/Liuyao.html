<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>六爻 · 起卦</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
	min-height: 100vh;
	background: #e8e0d5;
	display: flex;
	justify-content: center;
	align-items: flex-start;
	padding: 16px;
	font-family: Georgia, 'Noto Serif SC', 'PingFang SC', 'STSong', serif;
}
.container {
	max-width: 620px;
	width: 100%;
	background: #faf7f0;
	border: 1px solid rgba(120, 90, 50, 0.2);
	border-radius: 16px;
	padding: 24px 20px 28px;
	box-shadow: 0 4px 24px rgba(80, 50, 20, 0.08);
	position: relative;
	margin: 0 auto;
}
.reset-wrap { position: absolute; top: 18px; right: 20px; }
.btn-reset {
	background: transparent; border: 1px solid rgba(120, 90, 50, 0.2); color: rgba(90, 60, 30, 0.45);
	font-size: 14px; font-family: inherit; letter-spacing: 3px; cursor: pointer; padding: 4px 12px;
	border-radius: 14px; font-weight: 400; -webkit-tap-highlight-color: transparent; transition: all 0.3s;
}
.btn-reset:hover { background: rgba(120, 90, 50, 0.05); color: #4a3020; }
.btn-reset:active { background: rgba(120, 90, 50, 0.08); color: #4a3020; }
.title-area { text-align: center; padding-bottom: 14px; margin-bottom: 14px; border-bottom: 1px solid rgba(120, 90, 50, 0.15); }
.title-area h1 { font-size: 30px; font-weight: 700; letter-spacing: 12px; color: #4a3020; }
.title-area .sub { font-size: 16px; color: rgba(90, 60, 30, 0.5); letter-spacing: 8px; margin-top: 4px; font-weight: 400; }
.reason-wrap { margin-bottom: 10px; }
.reason-wrap input {
	width: 100%; background: #fff; border: 1px solid rgba(120, 90, 50, 0.25); border-radius: 20px;
	padding: 10px 16px; color: #3a2a1a; font-size: 15px; font-family: inherit; letter-spacing: 2px;
	outline: none; font-weight: 400; -webkit-appearance: none;
}
.reason-wrap input::placeholder { color: rgba(90, 60, 30, 0.35); letter-spacing: 3px; }
.reason-wrap input:focus { border-color: rgba(120, 90, 50, 0.5); box-shadow: 0 0 0 3px rgba(120, 90, 50, 0.06); }
.reason-wrap input:disabled { opacity: 0.5; background: rgba(0, 0, 0, 0.02); }
.reason-lock-hint { font-size: 13px; color: rgba(90, 60, 30, 0.35); letter-spacing: 2px; margin-top: 4px; padding-left: 4px; font-weight: 400; }
.hexagram-box { background: #fff; border: 1px solid rgba(120, 90, 50, 0.15); border-radius: 16px; padding: 20px 16px 16px; margin-bottom: 12px; }
.hexagram-stack { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 12px; }
.hexagram-col { display: flex; flex-direction: column; align-items: center; }
.hexagram-col .label { font-size: 13px; color: rgba(90, 60, 30, 0.4); letter-spacing: 4px; margin-bottom: 2px; font-weight: 400; }
.hexagram-col .gua-symbol { font-size: 40px; line-height: 1.2; color: #5a3a1a; }
.hexagram-col .name { font-size: 15px; color: #4a3020; letter-spacing: 2px; font-weight: 600; }
.hexagram-stack .divider { color: rgba(120, 90, 50, 0.12); font-size: 12px; letter-spacing: 4px; user-select: none; }
.hexagram-row { display: flex; gap: 16px; justify-content: center; align-items: flex-start; width: 100%; padding: 4px 0; }
.hexagram-row .hexagram-col { flex: 1; }
.hexagram-row .divider-vertical { color: rgba(120, 90, 50, 0.12); font-size: 12px; display: flex; align-items: center; }
.yao-list { display: flex; flex-direction: column-reverse; align-items: center; gap: 6px; padding: 10px 0 4px; border-top: 1px solid rgba(120, 90, 50, 0.1); min-height: 200px; }
.yao-item { display: flex; align-items: center; gap: 10px; padding: 4px 14px; border-radius: 20px; background: rgba(120, 90, 50, 0.03); min-width: 220px; justify-content: center; opacity: 0.3; border: 1px solid transparent; transition: all 0.3s; }
.yao-item.filled { opacity: 1; border-color: rgba(120, 90, 50, 0.1); background: rgba(120, 90, 50, 0.05); }
.yao-item.dong { border-color: rgba(180, 60, 40, 0.2); background: rgba(180, 60, 40, 0.04); }
.yao-item .yao-index { font-size: 15px; color: rgba(90, 60, 30, 0.5); min-width: 20px; letter-spacing: 2px; font-weight: 400; }
.yao-item .status-hint { font-size: 13px; color: rgba(90, 60, 30, 0.5); letter-spacing: 2px; font-weight: 400; }
.yao-item .yao-type-label { font-size: 14px; color: rgba(90, 60, 30, 0.45); min-width: 32px; text-align: center; font-weight: 400; letter-spacing: 1px; }
.yao-item.dong .yao-type-label { color: #a04030; }
.yao-line-yang { display: inline-block; width: 50px; height: 5px; background: #4a3020; border-radius: 3px; }
.yao-item.dong .yao-line-yang { background: #a04030; }
.yao-line-yin { display: inline-flex; align-items: center; gap: 6px; }
.yao-line-yin span { display: inline-block; width: 20px; height: 5px; background: #4a3020; border-radius: 3px; }
.yao-item.dong .yao-line-yin span { background: #a04030; }
.dong-mark { color: #a04030; font-size: 15px; margin-left: 2px; }
.yao-move-hint { font-size: 14px; color: rgba(90, 60, 30, 0.5); background: rgba(120, 90, 50, 0.04); padding: 4px 14px; border-radius: 20px; border: 1px solid rgba(120, 90, 50, 0.1); display: inline-block; letter-spacing: 2px; font-weight: 400; }
.info-area {
	background: #fff;
	border: 1px solid rgba(120, 90, 50, 0.15);
	border-radius: 16px;
	padding: 16px 18px;
	min-height: 40px;
	margin-bottom: 12px;
}
.info-area .text { color: rgba(60, 40, 20, 0.8); font-size: 15px; line-height: 1.9; letter-spacing: 0.5px; font-weight: 400; }
.info-area .text .highlight { color: #4a3020; font-weight: 600; letter-spacing: 1px; }
.info-area .text .gold { color: #6a4a20; }
.info-area .text .dim { color: rgba(90, 60, 30, 0.5); }
.info-area .text .line { display: block; margin-top: 3px; }
.info-area .text .time { color: rgba(90, 60, 30, 0.35); font-size: 13px; margin-top: 4px; letter-spacing: 1px; }
.info-area .text .yao-block { font-size: 0.9em; line-height: 1.8; margin-top: 2px; }
.info-area .text .yao-block .dong-text { color: #a04030; }

.classic-quote {
	text-align: center;
	padding: 10px 0 10px 0;
	margin-bottom: 2px;
}
.classic-quote .quote-line {
	font-size: 14px;
	color: rgba(90, 60, 30, 0.55);
	letter-spacing: 2px;
	font-weight: 400;
	line-height: 1.6;
}
.classic-quote .quote-source {
	font-size: 12px;
	color: rgba(90, 60, 30, 0.3);
	letter-spacing: 3px;
	font-weight: 300;
	margin-top: -1px;
}

.btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.btn { background: #fff; border: 1px solid rgba(120, 90, 50, 0.3); color: #4a3020; padding: 10px 28px; font-size: 16px; font-family: inherit; letter-spacing: 4px; border-radius: 20px; cursor: pointer; transition: all 0.3s; -webkit-tap-highlight-color: transparent; font-weight: 400; }
.btn-primary { background: rgba(120, 90, 50, 0.08); border-color: rgba(120, 90, 50, 0.4); }
.btn:hover { background: rgba(120, 90, 50, 0.1); }
.btn:active { background: rgba(120, 90, 50, 0.15); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.footer { text-align: center; margin-top: 14px; padding-top: 10px; border-top: 1px solid rgba(120, 90, 50, 0.05); }
.footer .version { font-size: 12px; color: rgba(90, 60, 30, 0.2); letter-spacing: 2px; }
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(80, 50, 20, 0.4); display: none; justify-content: center; align-items: center; z-index: 1000; }
.modal-overlay.active { display: flex; }
.modal-box { background: #faf7f0; border: 1px solid rgba(120, 90, 50, 0.2); border-radius: 20px; padding: 24px 28px; max-width: 360px; width: 90%; text-align: center; }
.modal-box .modal-title { color: #4a3020; font-size: 18px; letter-spacing: 6px; margin-bottom: 8px; font-weight: 600; }
.modal-box .modal-body { color: rgba(60, 40, 20, 0.7); font-size: 16px; line-height: 1.7; margin-bottom: 20px; letter-spacing: 1px; font-weight: 400; }
.modal-box .modal-btns { display: flex; gap: 10px; justify-content: center; flex-direction: row-reverse; }
.modal-box .modal-btns .btn { min-width: 60px; padding: 8px 20px; font-size: 15px; }

@media (min-width: 768px) {
	.container {
		max-width: 960px;
		padding: 28px 24px 32px;
	}

	.info-area .text { font-size: 16px; }
	.info-area .text .time { font-size: 14px; }
}

@media (max-width: 420px) {
	.container { padding: 16px 10px 20px; border-radius: 14px; }
	.title-area h1 { font-size: 24px; letter-spacing: 8px; }
	.hexagram-col .gua-symbol { font-size: 30px; }
	.hexagram-row { gap: 6px; }
	.yao-item { min-width: 160px; gap: 6px; padding: 3px 8px; }
	.yao-line-yang { width: 40px; }
	.yao-line-yin span { width: 16px; }
	.btn { font-size: 14px; padding: 8px 18px; }
	.info-area .text { font-size: 15px; }
	.classic-quote .quote-line { font-size: 13px; }
	.classic-quote .quote-source { font-size: 11px; }
}
</style>
</head>
<body>
<div class="container">
<div class="reset-wrap"><button class="btn-reset" id="btnReset">重置</button></div>
<div class="title-area"><h1>六爻起卦</h1><div class="sub">至 诚 感 通</div></div>
<div class="reason-wrap"><input type="text" id="reasonInput" placeholder="占问之事（选填）" maxlength="120"><div class="reason-lock-hint" id="reasonLockHint"></div></div>
<div class="hexagram-box">
<div class="hexagram-stack">
<div class="hexagram-row">
<div class="hexagram-col"><div class="label">本 卦</div><div class="gua-symbol" id="benGuaSymbol">—</div><div class="name" id="benGuaName">待起卦</div></div>
<div class="hexagram-col"><div class="label">互 卦</div><div class="gua-symbol" id="huGuaSymbol">—</div><div class="name" id="huGuaName">—</div></div>
<div class="hexagram-col"><div class="label">变 卦</div><div class="gua-symbol" id="bianGuaSymbol">—</div><div class="name" id="bianGuaName">—</div></div>
</div>
</div>
<div class="yao-list" id="yaoList"></div>
<div style="text-align:center; margin-top: 8px;"><span class="yao-move-hint" id="moveHint">动爻⚡：待起卦</span></div>
</div>

<div class="classic-quote">
<div class="quote-line">「初筮告，再三渎，渎则不告。」</div>
<div class="quote-source">—— 《周易·蒙》</div>
</div>

<div class="info-area"><div class="text" id="infoText">点击「摇卦」开始 · 六次成卦</div></div>
<div class="btn-group"><button class="btn btn-primary" id="btnShake">摇 卦</button><button class="btn btn-secondary" id="btnCopy" disabled>复制</button></div>
<div class="footer"><div class="version">v1.0 六爻起卦 · 铜钱古法</div></div>
</div>
<div class="modal-overlay" id="modalOverlay"><div class="modal-box"><div class="modal-title">确 认 重 置</div><div class="modal-body">前卦将弃，<br>诚心再起？</div><div class="modal-btns"><button class="btn btn-secondary" id="modalCancel">取消</button><button class="btn btn-primary" id="modalConfirm">确定</button></div></div></div>
<script>
const HEXAGRAMS = {
	"䷀": { name: "乾为天", upper: "乾", lower: "乾", text: "元亨利贞。", lines: ["潜龙勿用。", "见龙在田，利见大人。", "君子终日乾乾，夕惕若厉，无咎。", "或跃在渊，无咎。", "飞龙在天，利见大人。", "亢龙有悔。"] },
	"䷁": { name: "坤为地", upper: "坤", lower: "坤", text: "元亨，利牝马之贞。君子有攸往，先迷后得主，利。", lines: ["履霜，坚冰至。", "直方大，不习无不利。", "含章可贞，或从王事，无成有终。", "括囊，无咎无誉。", "黄裳，元吉。", "龙战于野，其血玄黄。"] },
	"䷂": { name: "水雷屯", upper: "坎", lower: "震", text: "屯，元亨利贞。勿用有攸往，利建侯。", lines: ["磐桓，利居贞，利建侯。", "屯如邅如，乘马班如。匪寇婚媾，女子贞不字，十年乃字。", "即鹿无虞，惟入于林中，君子几不如舍，往吝。", "乘马班如，求婚媾，往吉，无不利。", "屯其膏，小贞吉，大贞凶。", "乘马班如，泣血涟如。"] },
	"䷃": { name: "山水蒙", upper: "艮", lower: "坎", text: "蒙，亨。匪我求童蒙，童蒙求我。初筮告，再三渎，渎则不告。利贞。", lines: ["发蒙，利用刑人，用说桎梏，以往吝。", "包蒙，吉。纳妇，吉。子克家。", "勿用取女，见金夫，不有躬，无攸利。", "困蒙，吝。", "童蒙，吉。", "击蒙，不利为寇，利御寇。"] },
	"䷄": { name: "水天需", upper: "坎", lower: "乾", text: "需，有孚，光亨，贞吉。利涉大川。", lines: ["需于郊，利用恒，无咎。", "需于沙，小有言，终吉。", "需于泥，致寇至。", "需于血，出自穴。", "需于酒食，贞吉。", "入于穴，有不速之客三人来，敬之终吉。"] },
	"䷅": { name: "天水讼", upper: "乾", lower: "坎", text: "讼，有孚，窒惕，中吉，终凶。利见大人，不利涉大川。", lines: ["不永所事，小有言，终吉。", "不克讼，归而逋，其邑人三百户，无眚。", "食旧德，贞厉，终吉。或从王事，无成。", "不克讼，复即命，渝安贞，吉。", "讼，元吉。", "或锡之鞶带，终朝三褫之。"] },
	"䷆": { name: "地水师", upper: "坤", lower: "坎", text: "师，贞，丈人吉，无咎。", lines: ["师出以律，否臧凶。", "在师中，吉，无咎，王三锡命。", "师或舆尸，凶。", "师左次，无咎。", "田有禽，利执言，无咎。长子帅师，弟子舆尸，贞凶。", "大君有命，开国承家，小人勿用。"] },
	"䷇": { name: "水地比", upper: "坎", lower: "坤", text: "比，吉。原筮，元永贞，无咎。不宁方来，后夫凶。", lines: ["有孚比之，无咎。有孚盈缶，终来有它，吉。", "比之自内，贞吉。", "比之匪人。", "外比之，贞吉。", "显比，王用三驱，失前禽，邑人不诫，吉。", "比之无首，凶。"] },
	"䷈": { name: "风天小畜", upper: "巽", lower: "乾", text: "小畜，亨。密云不雨，自我西郊。", lines: ["复自道，何其咎，吉。", "牵复，吉。", "舆说辐，夫妻反目。", "有孚，血去惕出，无咎。", "有孚挛如，富以其邻。", "既雨既处，尚德载，妇贞厉，月几望，君子征凶。"] },
	"䷉": { name: "天泽履", upper: "乾", lower: "兑", text: "履虎尾，不咥人，亨。", lines: ["素履，往无咎。", "履道坦坦，幽人贞吉。", "眇能视，跛能履，履虎尾，咥人，凶。武人为于大君。", "履虎尾，愬愬，终吉。", "夬履，贞厉。", "视履考祥，其旋元吉。"] },
	"䷊": { name: "地天泰", upper: "坤", lower: "乾", text: "泰，小往大来，吉亨。", lines: ["拔茅茹，以其汇，征吉。", "包荒，用冯河，不遐遗，朋亡，得尚于中行。", "无平不陂，无往不复，艰贞无咎，勿恤其孚，于食有福。", "翩翩，不富以其邻，不戒以孚。", "帝乙归妹，以祉元吉。", "城复于隍，勿用师，自邑告命，贞吝。"] },
	"䷋": { name: "天地否", upper: "乾", lower: "坤", text: "否之匪人，不利君子贞，大往小来。", lines: ["拔茅茹，以其汇，贞吉亨。", "包承，小人吉，大人否亨。", "包羞。", "有命无咎，畴离祉。", "休否，大人吉，其亡其亡，系于苞桑。", "倾否，先否后喜。"] },
	"䷌": { name: "天火同人", upper: "乾", lower: "离", text: "同人于野，亨。利涉大川，利君子贞。", lines: ["同人于门，无咎。", "同人于宗，吝。", "伏戎于莽，升其高陵，三岁不兴。", "同人于郊，无悔。"] },
	"䷍": { name: "火天大有", upper: "离", lower: "乾", text: "大有，元亨。", lines: ["无交害，匪咎，艰则无咎。", "大车以载，有攸往，无咎。", "公用亨于天子，小人弗克。", "匪其彭，无咎。", "厥孚交如，威如，吉。", "自天祐之，吉，无不利。"] },
	"䷎": { name: "地山谦", upper: "坤", lower: "艮", text: "谦，亨，君子有终。", lines: ["谦谦君子，用涉大川，吉。", "鸣谦，贞吉。", "劳谦君子，有终吉。", "无不利，撝谦。", "不富以其邻，利用侵伐，无不利。", "鸣谦，利用行师，征邑国。"] },
	"䷏": { name: "雷地豫", upper: "震", lower: "坤", text: "豫，利建侯行师。", lines: ["鸣豫，凶。", "介于石，不终日，贞吉。", "盱豫，悔，迟有悔。", "由豫，大有得，勿疑朋盍簪。", "贞疾，恒不死。", "冥豫，成有渝，无咎。"] },
	"䷐": { name: "泽雷随", upper: "兑", lower: "震", text: "随，元亨利贞，无咎。", lines: ["官有渝，贞吉，出门交有功。", "系小子，失丈夫。", "系丈夫，失小子，随有求得，利居贞。", "随有获，贞凶，有孚在道，以明，何咎。", "孚于嘉，吉。", "拘系之，乃从维之，王用亨于西山。"] },
	"䷑": { name: "山风蛊", upper: "艮", lower: "巽", text: "蛊，元亨，利涉大川。先甲三日，后甲三日。", lines: ["干父之蛊，有子，考无咎，厉终吉。", "干母之蛊，不可贞。", "干父之蛊，小有悔，无大咎。", "裕父之蛊，往见吝。", "干父之蛊，用誉。", "不事王侯，高尚其事。"] },
	"䷒": { name: "地泽临", upper: "坤", lower: "兑", text: "临，元亨利贞。至于八月有凶。", lines: ["咸临，贞吉。", "咸临，吉，无不利。", "甘临，无攸利，既忧之，无咎。", "至临，无咎。", "知临，大君之宜，吉。", "敦临，吉，无咎。"] },
	"䷓": { name: "风地观", upper: "巽", lower: "坤", text: "观，盥而不荐，有孚颙若。", lines: ["童观，小人无咎，君子吝。", "窥观，利女贞。", "观我生，进退。", "观国之光，利用宾于王。", "观我生，君子无咎。", "观其生，君子无咎。"] },
	"䷔": { name: "火雷噬嗑", upper: "离", lower: "震", text: "噬嗑，亨，利用狱。", lines: ["屦校灭趾，无咎。", "噬肤灭鼻，无咎。", "噬腊肉，遇毒，小吝，无咎。", "噬干胏，得金矢，利艰贞，吉。", "噬干肉，得黄金，贞厉，无咎。", "何校灭耳，凶。"] },
	"䷕": { name: "山火贲", upper: "艮", lower: "离", text: "贲，亨。小利有攸往。", lines: ["贲其趾，舍车而徒。", "贲其须。", "贲如濡如，永贞吉。", "贲如皤如，白马翰如，匪寇婚媾。", "贲于丘园，束帛戋戋，吝，终吉。", "白贲，无咎。"] },
	"䷖": { name: "山地剥", upper: "艮", lower: "坤", text: "剥，不利有攸往。", lines: ["剥床以足，蔑贞凶。", "剥床以辨，蔑贞凶。", "剥之，无咎。", "剥床以肤，凶。", "贯鱼，以宫人宠，无不利。", "硕果不食，君子得舆，小人剥庐。"] },
	"䷗": { name: "地雷复", upper: "坤", lower: "震", text: "复，亨。出入无疾，朋来无咎。反复其道，七日来复，利有攸往。", lines: ["不远复，无祗悔，元吉。", "休复，吉。", "频复，厉，无咎。", "中行独复。", "敦复，无悔。", "迷复，凶，有灾眚，用行师，终有大败。"] },
	"䷘": { name: "天雷无妄", upper: "乾", lower: "震", text: "无妄，元亨利贞。其匪正有眚，不利有攸往。", lines: ["无妄，往吉。", "不耕获，不菑畲，则利有攸往。", "无妄之灾，或系之牛，行人之得，邑人之灾。", "可贞，无咎。", "无妄之疾，勿药有喜。", "无妄，行有眚，无攸利。"] },
	"䷙": { name: "山天大畜", upper: "艮", lower: "乾", text: "大畜，利贞。不家食吉，利涉大川。", lines: ["有厉，利已。", "舆说辐。", "良马逐，利艰贞，日闲舆卫，利有攸往。", "童牛之牿，元吉。", "豮豕之牙，吉。", "何天之衢，亨。"] },
	"䷚": { name: "山雷颐", upper: "艮", lower: "震", text: "颐，贞吉。观颐，自求口实。", lines: ["舍尔灵龟，观我朵颐，凶。", "颠颐，拂经于丘颐，征凶。", "拂颐，贞凶，十年勿用，无攸利。", "颠颐，吉，虎视眈眈，其欲逐逐，无咎。", "拂经，居贞吉，不可涉大川。", "由颐，厉吉，利涉大川。"] },
	"䷛": { name: "泽风大过", upper: "兑", lower: "巽", text: "大过，栋桡，利有攸往，亨。", lines: ["藉用白茅，无咎。", "枯杨生稊，老夫得其女妻，无不利。", "栋桡，凶。", "栋隆，吉，有它吝。", "枯杨生华，老妇得其士夫，无咎无誉。", "过涉灭顶，凶，无咎。"] },
	"䷜": { name: "坎为水", upper: "坎", lower: "坎", text: "习坎，有孚，维心亨。行有尚。", lines: ["习坎，入于坎窞，凶。", "坎有险，求小得。", "来之坎坎，险且枕，入于坎窞，勿用。", "樽酒簋贰，用缶，纳约自牖，终无咎。", "坎不盈，祗既平，无咎。", "系用徽纆，寘于丛棘，三岁不得，凶。"] },
	"䷝": { name: "离为火", upper: "离", lower: "离", text: "离，利贞，亨。畜牝牛吉。", lines: ["履错然，敬之无咎。", "黄离，元吉。", "日昃之离，不鼓缶而歌，则大耋之嗟，凶。", "突如其来如，焚如，死如，弃如。", "出涕沱若，戚嗟若，吉。", "王用出征，有嘉折首，获匪其丑，无咎。"] },
	"䷞": { name: "泽山咸", upper: "兑", lower: "艮", text: "咸，亨，利贞，取女吉。", lines: ["咸其拇。", "咸其腓，凶，居吉。", "咸其股，执其随，往吝。", "贞吉悔亡，憧憧往来，朋从尔思。", "咸其脢，无悔。", "咸其辅颊舌。"] },
	"䷟": { name: "雷风恒", upper: "震", lower: "巽", text: "恒，亨，无咎，利贞，利有攸往。", lines: ["浚恒，贞凶，无攸利。", "悔亡。", "不恒其德，或承之羞，贞吝。", "田无禽。", "恒其德，贞，妇人吉，夫子凶。", "振恒，凶。"] },
	"䷠": { name: "天山遁", upper: "乾", lower: "艮", text: "遁，亨，小利贞。", lines: ["遁尾，厉，勿用有攸往。", "执之用黄牛之革，莫之胜说。", "系遁，有疾厉，畜臣妾吉。", "好遁，君子吉，小人否。", "嘉遁，贞吉。", "肥遁，无不利。"] },
	"䷡": { name: "雷天大壮", upper: "震", lower: "乾", text: "大壮，利贞。", lines: ["壮于趾，征凶，有孚。", "贞吉。", "小人用壮，君子用罔，贞厉。羝羊触藩，羸其角。", "贞吉悔亡，藩决不羸，壮于大舆之輹。", "丧羊于易，无悔。", "羝羊触藩，不能退，不能遂，无攸利，艰则吉。"] },
	"䷢": { name: "火地晋", upper: "离", lower: "坤", text: "晋，康侯用锡马蕃庶，昼日三接。", lines: ["晋如摧如，贞吉，罔孚，裕无咎。", "晋如愁如，贞吉，受兹介福，于其王母。", "众允，悔亡。", "晋如鼫鼠，贞厉。", "悔亡，失得勿恤，往吉，无不利。", "晋其角，维用伐邑，厉吉无咎，贞吝。"] },
	"䷣": { name: "地火明夷", upper: "坤", lower: "离", text: "明夷，利艰贞。", lines: ["明夷于飞，垂其翼，君子于行，三日不食，有攸往，主人有言。", "明夷于左股，用拯马壮，吉。", "明夷于南狩，得其大首，不可疾贞。", "入于左腹，获明夷之心，于出门庭。", "箕子之明夷，利贞。", "不明晦，初登于天，后入于地。"] },
	"䷤": { name: "风火家人", upper: "巽", lower: "离", text: "家人，利女贞。", lines: ["闲有家，悔亡。", "无攸遂，在中馈，贞吉。", "家人嗃嗃，悔厉吉，妇子嘻嘻，终吝。", "富家，大吉。", "王假有家，勿恤，吉。", "有孚威如，终吉。"] },
	"䷥": { name: "火泽睽", upper: "离", lower: "兑", text: "睽，小事吉。", lines: ["悔亡，丧马勿逐，自复，见恶人无咎。", "遇主于巷，无咎。", "见舆曳，其牛掣，其人天且劓，无初有终。", "睽孤，遇元夫，交孚，厉无咎。", "悔亡，厥宗噬肤，往何咎。", "睽孤，见豕负涂，载鬼一车，先张之弧，后说之弧，匪寇婚媾，往遇雨则吉。"] },
	"䷦": { name: "水山蹇", upper: "坎", lower: "艮", text: "蹇，利西南，不利东北；利见大人，贞吉。", lines: ["往蹇，来誉。", "王臣蹇蹇，匪躬之故。", "往蹇，来反。", "往蹇，来连。", "大蹇，朋来。", "往蹇，来硕，吉，利见大人。"] },
	"䷧": { name: "雷水解", upper: "震", lower: "坎", text: "解，利西南，无所往，其来复吉。有攸往，夙吉。", lines: ["无咎。", "田获三狐，得黄矢，贞吉。", "负且乘，致寇至，贞吝。", "解而拇，朋至斯孚。", "君子维有解，吉，有孚于小人。", "公用射隼于高墉之上，获之，无不利。"] },
	"䷨": { name: "山泽损", upper: "艮", lower: "兑", text: "损，有孚，元吉，无咎，可贞。利有攸往，曷之用，二簋可用享。", lines: ["已事遄往，无咎，酌损之。", "利贞，征凶，弗损益之。", "三人行，则损一人；一人行，则得其友。", "损其疾，使遄有喜，无咎。", "或益之十朋之龟，弗克违，元吉。", "弗损益之，无咎，贞吉，利有攸往，得臣无家。"] },
	"䷩": { name: "风雷益", upper: "巽", lower: "震", text: "益，利有攸往，利涉大川。", lines: ["利用为大作，元吉，无咎。", "或益之十朋之龟，弗克违，永贞吉，王用享于帝，吉。", "益之用凶事，无咎，有孚中行，告公用圭。", "中行，告公从，利用为依迁国。", "有孚惠心，勿问元吉，有孚惠我德。", "莫益之，或击之，立心勿恒，凶。"] },
	"䷪": { name: "泽天夬", upper: "兑", lower: "乾", text: "夬，扬于王庭，孚号有厉。告自邑，不利即戎，利有攸往。", lines: ["壮于前趾，往不胜为咎。", "惕号，莫夜有戎，勿恤。", "壮于頄，有凶，君子夬夬，独行遇雨，若濡有愠，无咎。", "臀无肤，其行次且，牵羊悔亡，闻言不信。", "苋陆夬夬，中行无咎。", "无号，终有凶。"] },
	"䷫": { name: "天风姤", upper: "乾", lower: "巽", text: "姤，女壮，勿用取女。", lines: ["系于金柅，贞吉，有攸往，见凶，羸豕孚蹢躅。", "包有鱼，无咎，不利宾。", "臀无肤，其行次且，厉，无大咎。", "包无鱼，起凶。", "以杞包瓜，含章，有陨自天。", "姤其角，吝，无咎。"] },
	"䷬": { name: "泽地萃", upper: "兑", lower: "坤", text: "萃，亨。王假有庙，利见大人，亨，利贞。用大牲吉，利有攸往。", lines: ["有孚不终，乃乱乃萃，若号，一握为笑，勿恤，往无咎。", "引吉，无咎，孚乃利用禴。", "萃如嗟如，无攸利，往无咎，小吝。", "大吉，无咎。", "萃有位，无咎，匪孚，元永贞，悔亡。", "赍咨涕洟，无咎。"] },
	"䷭": { name: "地风升", upper: "坤", lower: "巽", text: "升，元亨，用见大人，勿恤，南征吉。", lines: ["允升，大吉。", "孚乃利用禴，无咎。", "升虚邑。", "王用亨于岐山，吉，无咎。", "贞吉，升阶。", "冥升，利于不息之贞。"] },
	"䷮": { name: "泽水困", upper: "兑", lower: "坎", text: "困，亨，贞，大人吉，无咎。有言不信。", lines: ["臀困于株木，入于幽谷，三岁不觌。", "困于酒食，朱绂方来，利用享祀，征凶，无咎。", "困于石，据于蒺藜，入于其宫，不见其妻，凶。", "来徐徐，困于金车，吝，有终。", "劓刖，困于赤绂，乃徐有说，利用祭祀。", "困于葛藟，于臲兀，曰动悔有悔，征吉。"] },
	"䷯": { name: "水风井", upper: "坎", lower: "巽", text: "井，改邑不改井，无丧无得，往来井井。汔至亦未繘井，羸其瓶，凶。", lines: ["井泥不食，旧井无禽。", "井谷射鲋，瓮敝漏。", "井渫不食，为我心恻，可用汲，王明，并受其福。", "井甃，无咎。", "井冽，寒泉食。", "井收勿幕，有孚元吉。"] },
	"䷰": { name: "泽火革", upper: "兑", lower: "离", text: "革，己日乃孚，元亨利贞。悔亡。", lines: ["巩用黄牛之革。", "己日乃革之，征吉，无咎。", "征凶，贞厉，革言三就，有孚。", "悔亡，有孚改命，吉。", "大人虎变，未占有孚。", "君子豹变，小人革面，征凶，居贞吉。"] },
	"䷱": { name: "火风鼎", upper: "离", lower: "巽", text: "鼎，元吉，亨。", lines: ["鼎颠趾，利出否，得妾以其子，无咎。", "鼎有实，我仇有疾，不我能即，吉。", "鼎耳革，其行塞，雉膏不食，方雨亏悔，终吉。", "鼎折足，覆公餗，其形渥，凶。", "鼎黄耳金铉，利贞。", "鼎玉铉，大吉，无不利。"] },
	"䷲": { name: "震为雷", upper: "震", lower: "震", text: "震，亨。震来虩虩，笑言哑哑。震惊百里，不丧匕鬯。", lines: ["震来虩虩，后笑言哑哑，吉。", "震来厉，亿丧贝，跻于九陵，勿逐，七日得。", "震苏苏，震行无眚。", "震遂泥。", "震往来厉，亿无丧，有事。", "震索索，视矍矍，征凶，震不于其躬，于其邻，无咎，婚媾有言。"] },
	"䷳": { name: "艮为山", upper: "艮", lower: "艮", text: "艮其背，不获其身，行其庭，不见其人，无咎。", lines: ["艮其趾，无咎，利永贞。", "艮其腓，不拯其随，其心不快。", "艮其限，列其夤，厉薰心。", "艮其身，无咎。", "艮其辅，言有序，悔亡。", "敦艮，吉。"] },
	"䷴": { name: "风山渐", upper: "巽", lower: "艮", text: "渐，女归吉，利贞。", lines: ["鸿渐于干，小子厉，有言，无咎。", "鸿渐于磐，饮食衎衎，吉。", "鸿渐于陆，夫征不复，妇孕不育，凶，利御寇。", "鸿渐于木，或得其桷，无咎。", "鸿渐于陵，妇三岁不孕，终莫之胜，吉。", "鸿渐于逵，其羽可用为仪，吉。"] },
	"䷵": { name: "雷泽归妹", upper: "震", lower: "兑", text: "归妹，征凶，无攸利。", lines: ["归妹以娣，跛能履，征吉。", "眇能视，利幽人之贞。", "归妹以须，反归以娣。", "归妹愆期，迟归有时。", "帝乙归妹，其君之袂，不如其娣之袂良，月几望，吉。", "女承筐无实，士刲羊无血，无攸利。"] },
	"䷶": { name: "雷火丰", upper: "震", lower: "离", text: "丰，亨，王假之，勿忧，宜日中。", lines: ["遇其配主，虽旬无咎，往有尚。", "丰其蔀，日中见斗，往得疑疾，有孚发若，吉。", "丰其沛，日中见沬，折其右肱，无咎。", "丰其蔀，日中见斗，遇其夷主，吉。", "来章，有庆誉，吉。", "丰其屋，蔀其家，窥其户，阒其无人，三岁不觌，凶。"] },
	"䷷": { name: "火山旅", upper: "离", lower: "艮", text: "旅，小亨，旅贞吉。", lines: ["旅琐琐，斯其所取灾。", "旅即次，怀其资，得童仆贞。", "旅焚其次，丧其童仆，贞厉。", "旅于处，得其资斧，我心不快。", "射雉一矢亡，终以誉命。", "鸟焚其巢，旅人先笑后号咷，丧牛于易，凶。"] },
	"䷸": { name: "巽为风", upper: "巽", lower: "巽", text: "巽，小亨，利有攸往，利见大人。", lines: ["进退，利武人之贞。", "巽在床下，用史巫纷若，吉，无咎。", "频巽，吝。", "悔亡，田获三品。", "贞吉悔亡，无不利，无初有终，先庚三日，后庚三日，吉。", "巽在床下，丧其资斧，贞凶。"] },
	"䷹": { name: "兑为泽", upper: "兑", lower: "兑", text: "兑，亨，利贞。", lines: ["和兑，吉。", "孚兑，吉，悔亡。", "来兑，凶。", "商兑未宁，介疾有喜。", "孚于剥，有厉。", "引兑。"] },
	"䷺": { name: "风水涣", upper: "巽", lower: "坎", text: "涣，亨。王假有庙，利涉大川，利贞。", lines: ["用拯马壮，吉。", "涣奔其机，悔亡。", "涣其躬，无悔。", "涣其群，元吉，涣有丘，匪夷所思。", "涣汗其大号，涣王居，无咎。", "涣其血，去逖出，无咎。"] },
	"䷻": { name: "水泽节", upper: "坎", lower: "兑", text: "节，亨，苦节不可贞。", lines: ["不出户庭，无咎。", "不出门庭，凶。", "不节若，则嗟若，无咎。", "安节，亨。", "甘节，吉，往有尚。", "苦节，贞凶，悔亡。"] },
	"䷼": { name: "风泽中孚", upper: "巽", lower: "兑", text: "中孚，豚鱼吉，利涉大川，利贞。", lines: ["虞吉，有它不燕。", "鸣鹤在阴，其子和之，我有好爵，吾与尔靡之。", "得敌，或鼓或罢，或泣或歌。", "月几望，马匹亡，无咎。", "有孚挛如，无咎。", "翰音登于天，贞凶。"] },
	"䷽": { name: "雷山小过", upper: "震", lower: "艮", text: "小过，亨，利贞。可小事，不可大事。飞鸟遗之音，不宜上，宜下，大吉。", lines: ["飞鸟以凶。", "过其祖，遇其妣，不及其君，遇其臣，无咎。", "弗过防之，从或戕之，凶。", "无咎，弗过遇之，往厉必戒，勿用永贞。", "密云不雨，自我西郊，公弋取彼在穴。", "弗遇过之，飞鸟离之，凶，是谓灾眚。"] },
	"䷾": { name: "水火既济", upper: "坎", lower: "离", text: "既济，亨小，利贞，初吉终乱。", lines: ["曳其轮，濡其尾，无咎。", "妇丧其茀，勿逐，七日得。", "高宗伐鬼方，三年克之，小人勿用。", "繻有衣袽，终日戒。", "东邻杀牛，不如西邻之禴祭，实受其福。", "濡其首，厉。"] },
	"䷿": { name: "火水未济", upper: "离", lower: "坎", text: "未济，亨。小狐汔济，濡其尾，无攸利。", lines: ["濡其尾，吝。", "曳其轮，贞吉。", "未济，征凶，利涉大川。", "贞吉悔亡，震用伐鬼方，三年有赏于大国。", "贞吉无悔，君子之光，有孚，吉。", "有孚于饮酒，无咎，濡其首，有孚失是。"] }
};

const TRIGRAMS = ['坤', '震', '坎', '兑', '艮', '离', '巽', '乾'];

const findGuaByUpperLower = (upper, lower) => {
	for (const [sym, data] of Object.entries(HEXAGRAMS)) {
		if (data.upper === upper && data.lower === lower) return sym;
	}
	return null;
};

const $ = (id) => document.getElementById(id);
const benGuaSymbol = $('benGuaSymbol'), benGuaName = $('benGuaName');
const huGuaSymbol = $('huGuaSymbol'), huGuaName = $('huGuaName');
const bianGuaSymbol = $('bianGuaSymbol'), bianGuaName = $('bianGuaName');
const yaoListEl = $('yaoList'), moveHint = $('moveHint'), infoText = $('infoText');
const btnShake = $('btnShake'), btnCopy = $('btnCopy'), btnReset = $('btnReset');
const modalOverlay = $('modalOverlay'), modalCancel = $('modalCancel'), modalConfirm = $('modalConfirm');
const reasonInput = $('reasonInput'), reasonLockHint = $('reasonLockHint');

const getPosName = (pos) => ['', '初', '二', '三', '四', '五', '上'][pos] || String(pos);

const getYaoTitle = (index, isYang) => {
	const posNames = ['初', '二', '三', '四', '五', '上'];
	const yinYang = isYang ? '九' : '六';
	if (index === 0 || index === 5) {
		return posNames[index] + yinYang;
	}
	return yinYang + posNames[index];
};

const fairCoin = () => { const range = 2; const limit = Math.floor(0x100000000 / range) * range; const sample = new Uint32Array(1); do { crypto.getRandomValues(sample); } while (sample[0] >= limit); return sample[0] % 2; };
const shakeCoin = () => { const sum = fairCoin() + fairCoin() + fairCoin(); const typeMap = ['老阴', '少阴', '少阳', '老阳']; return { type: typeMap[sum], isYang: sum === 2 || sum === 3, isDong: sum === 0 || sum === 3 }; };

const getBenSymbolFromState = () => {
	const yaoBits = state.yaoList.map((y) => (y.isYang ? 1 : 0));
	const lowerIdx = yaoBits[0] + yaoBits[1] * 2 + yaoBits[2] * 4;
	const upperIdx = yaoBits[3] + yaoBits[4] * 2 + yaoBits[5] * 4;
	return findGuaByUpperLower(TRIGRAMS[upperIdx], TRIGRAMS[lowerIdx]) || '䷀';
};

const shakeOneYao = () => {
	if (state.completed) return;
	if (state.step === 0) {
		state.startTime = new Date();
		state.reason = reasonInput.value.trim() || '';
		reasonInput.disabled = true;
		reasonLockHint.textContent = '起卦已定事由不可更改';
	}
	const { type, isYang, isDong } = shakeCoin();
	state.yaoList.push({ type, isYang, isDong });
	state.step++;
	renderYao(state.step - 1, type, isYang, isDong);
	if (state.step === 6) {
		state.completed = true;
		btnShake.disabled = true;
		btnShake.textContent = '卦成';
		btnCopy.disabled = false;
		analyzeGua();
	} else {
		const posNames = ['初', '二', '三', '四', '五', '上'];
		btnShake.textContent = `摇卦 · ${posNames[state.step - 1]}爻已得`;
	}
};

const renderYao = (index, type, isYang, isDong) => {
	const items = yaoListEl.querySelectorAll('.yao-item'); const item = items[index]; if (!item) return;
	item.classList.add('filled'); if (isDong) item.classList.add('dong'); const hint = item.querySelector('.status-hint'); if (hint) hint.remove();
	const label = document.createElement('span'); label.className = 'yao-type-label'; label.textContent = type; item.appendChild(label);
	const lineWrapper = document.createElement('span');
	if (isYang) { const yang = document.createElement('span'); yang.className = 'yao-line-yang'; lineWrapper.appendChild(yang); }
	else { const yin = document.createElement('span'); yin.className = 'yao-line-yin'; const seg1 = document.createElement('span'), seg2 = document.createElement('span'); yin.appendChild(seg1); yin.appendChild(seg2); lineWrapper.appendChild(yin); }
	item.appendChild(lineWrapper);
	if (isDong) { const mark = document.createElement('span'); mark.className = 'dong-mark'; mark.textContent = '⚡'; item.appendChild(mark); }
	updateMoveHint();
};

const updateMoveHint = () => {
	const dongPositions = [];
	state.yaoList.forEach((y, idx) => {
		if (y.isDong) {
			dongPositions.push(getPosName(idx + 1));
		}
	});
	if (state.step === 0) moveHint.textContent = '动爻⚡：待起卦';
	else if (dongPositions.length === 0) moveHint.textContent = '动爻⚡：无 · 静卦';
	else moveHint.textContent = `动爻⚡：${dongPositions.join('、')}  ·  共 ${dongPositions.length} 爻动`;
};

const analyzeGua = () => {
	const benSymbol = getBenSymbolFromState();
	const benData = HEXAGRAMS[benSymbol];
	const bianBits = state.yaoList.map((y) => y.isDong ? (y.isYang ? 0 : 1) : (y.isYang ? 1 : 0));
	const bianLowerIdx = bianBits[0] + bianBits[1] * 2 + bianBits[2] * 4;
	const bianUpperIdx = bianBits[3] + bianBits[4] * 2 + bianBits[5] * 4;
	const bianSymbol = findGuaByUpperLower(TRIGRAMS[bianUpperIdx], TRIGRAMS[bianLowerIdx]) || null;
	const bianData = bianSymbol ? HEXAGRAMS[bianSymbol] : null;

	const huLowerIdx = (state.yaoList[1].isYang ? 1 : 0) + (state.yaoList[2].isYang ? 2 : 0) + (state.yaoList[3].isYang ? 4 : 0);
	const huUpperIdx = (state.yaoList[2].isYang ? 1 : 0) + (state.yaoList[3].isYang ? 2 : 0) + (state.yaoList[4].isYang ? 4 : 0);
	const huSymbol = findGuaByUpperLower(TRIGRAMS[huUpperIdx], TRIGRAMS[huLowerIdx]) || null;
	const huData = huSymbol ? HEXAGRAMS[huSymbol] : null;

	benGuaSymbol.textContent = benSymbol;
	benGuaName.textContent = benData?.name ?? '未知';
	huGuaSymbol.textContent = huSymbol || '—';
	huGuaName.textContent = huData?.name ?? '—';

	const dongCount = state.yaoList.filter((y) => y.isDong).length;
	if (dongCount === 0) {
		bianGuaSymbol.textContent = '—';
		bianGuaName.textContent = '无变卦';
	} else {
		bianGuaSymbol.textContent = bianSymbol || '—';
		bianGuaName.textContent = bianData?.name ?? '未知';
	}

	const lines = [];
	const dongColor = '#a04030';

	lines.push(`【本卦】${benSymbol} ${benData?.name ?? '未知'}`);
	lines.push(`卦辞：${benData?.text ?? '（待补）'}`);
	if (benData?.lines) {
		benData.lines.forEach((lineText, idx) => {
			const title = getYaoTitle(idx, state.yaoList[idx].isYang);
			const isDong = state.yaoList[idx].isDong;
			const colorStyle = isDong ? `style="color:${dongColor};"` : '';
			lines.push(`  <span ${colorStyle}>${title}：${lineText}${isDong ? ' ⚡' : ''}</span>`);
		});
	}

	if (dongCount > 0 && bianData) {
		lines.push('');
		lines.push(`【变卦】${bianSymbol} ${bianData?.name ?? '未知'}`);
		lines.push(`卦辞：${bianData?.text ?? '（待补）'}`);
		if (bianData?.lines) {
			bianData.lines.forEach((lineText, idx) => {
				const isYang = bianBits[idx] === 1;
				const title = getYaoTitle(idx, isYang);
				lines.push(`  ${title}：${lineText}`);
			});
		}
	}

	const dongPos = [], staticPos = [];
	state.yaoList.forEach((y, idx) => {
		const pos = idx + 1;
		if (y.isDong) {
			dongPos.push(`${getPosName(pos)}爻（${y.type}）`);
		} else {
			staticPos.push(`${getPosName(pos)}爻（${y.type}）`);
		}
	});
	lines.push('');
	lines.push(`动爻：${dongPos.length ? dongPos.join('；') : '无'}`);
	lines.push(`静爻：${staticPos.length ? staticPos.join('；') : '无'}`);

	const timeStr = state.startTime ? formatTime(state.startTime) : '';
	const reasonStr = state.reason ? `占问：${state.reason}` : '（未填写事由）';

	const plainLines = [];
	plainLines.push(`【本卦】${benSymbol} ${benData?.name ?? '未知'}`);
	plainLines.push(`卦辞：${benData?.text ?? '（待补）'}`);
	if (benData?.lines) {
		benData.lines.forEach((lineText, idx) => {
			const title = getYaoTitle(idx, state.yaoList[idx].isYang);
			const isDong = state.yaoList[idx].isDong;
			plainLines.push(`  ${title}：${lineText}${isDong ? ' ⚡' : ''}`);
		});
	}
	if (dongCount > 0 && bianData) {
		plainLines.push('');
		plainLines.push(`【变卦】${bianSymbol} ${bianData?.name ?? '未知'}`);
		plainLines.push(`卦辞：${bianData?.text ?? '（待补）'}`);
		if (bianData?.lines) {
			bianData.lines.forEach((lineText, idx) => {
				const isYang = bianBits[idx] === 1;
				const title = getYaoTitle(idx, isYang);
				plainLines.push(`  ${title}：${lineText}`);
			});
		}
	}
	const dongPlain = [], staticPlain = [];
	state.yaoList.forEach((y, idx) => {
		const pos = idx + 1;
		if (y.isDong) dongPlain.push(`${getPosName(pos)}爻（${y.type}）`);
		else staticPlain.push(`${getPosName(pos)}爻（${y.type}）`);
	});
	plainLines.push('');
	plainLines.push(`动爻：${dongPlain.length ? dongPlain.join('；') : '无'}`);
	plainLines.push(`静爻：${staticPlain.length ? staticPlain.join('；') : '无'}`);

	state.resultText = `【六爻卦象】\n起卦时间：${timeStr}\n${reasonStr}\n\n${plainLines.join('\n')}`;

	let summary = '';
	if (dongCount === 0) {
		summary = `本卦「${benData?.name}」· 静卦`;
	} else {
		summary = `本卦「${benData?.name}」→ 变卦「${bianData?.name ?? '未知'}」· ${dongCount}爻动`;
	}
	const fullHtml = lines.join('<br>');
	infoText.innerHTML = `<span class="highlight">${summary}</span><br><span class="yao-block">${fullHtml}</span>${state.reason ? `<br><span class="line dim">占问：${state.reason}</span>` : ''}<br><span class="line time">${timeStr}</span>`;
};

const formatTime = (date) => { const pad = (n) => String(n).padStart(2, '0'); return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`; };
const copyResult = async () => { if (!state.resultText) return; try { await navigator.clipboard.writeText(state.resultText); } catch { const ta = document.createElement('textarea'); ta.value = state.resultText; ta.style.position = 'fixed'; ta.style.left = '-9999px'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); } btnCopy.textContent = '已复制'; setTimeout(() => { btnCopy.textContent = '复制'; }, 1800); };
const resetAll = () => { if (state.completed || state.step > 0) { modalOverlay.classList.add('active'); } else { initUI(); } };
const confirmReset = () => { modalOverlay.classList.remove('active'); initUI(); };
const cancelReset = () => modalOverlay.classList.remove('active');

const initUI = () => {
	yaoListEl.innerHTML = ''; const posNames = ['初', '二', '三', '四', '五', '上'];
	for (let i = 0; i < 6; i++) { const item = document.createElement('div'); item.className = 'yao-item'; const idxSpan = document.createElement('span'); idxSpan.className = 'yao-index'; idxSpan.textContent = posNames[i]; item.appendChild(idxSpan); const hint = document.createElement('span'); hint.className = 'status-hint'; hint.textContent = '待摇'; item.appendChild(hint); yaoListEl.appendChild(item); }
	btnShake.textContent = '摇卦'; btnShake.disabled = false; btnCopy.disabled = true; btnCopy.textContent = '复制';
	benGuaSymbol.textContent = '—'; benGuaName.textContent = '待起卦';
	huGuaSymbol.textContent = '—'; huGuaName.textContent = '—';
	bianGuaSymbol.textContent = '—'; bianGuaName.textContent = '—';
	moveHint.textContent = '动爻⚡：待起卦'; infoText.innerHTML = '点击「摇卦」开始 · 六次成卦';
	state.step = 0; state.yaoList = []; state.completed = false; state.resultText = ''; state.startTime = null; state.reason = '';
	reasonInput.value = ''; reasonInput.disabled = false; reasonLockHint.textContent = '';
};

document.addEventListener('keydown', (e) => { if (modalOverlay.classList.contains('active')) { if (e.key === 'Enter') { e.preventDefault(); confirmReset(); } else if (e.key === 'Escape') { e.preventDefault(); cancelReset(); } return; } if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); if (!state.completed) shakeOneYao(); } if ((e.key === 'c' || e.key === 'C') && state.completed && state.resultText) { e.preventDefault(); copyResult(); } if (e.key === 'r' || e.key === 'R') { e.preventDefault(); resetAll(); } });
btnShake.addEventListener('click', shakeOneYao);
btnCopy.addEventListener('click', copyResult);
btnReset.addEventListener('click', resetAll);
modalCancel.addEventListener('click', cancelReset);
modalConfirm.addEventListener('click', confirmReset);
modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) cancelReset(); });
initUI();
</script>
</body>
</html>
